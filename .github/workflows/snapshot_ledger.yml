name: Snapshot Model A Ledger

on:
  schedule:
    # 9:30 PM UTC = 5:30 PM ET (30 min after market close)
    - cron: "30 21 * * 1-5"
  workflow_dispatch: # manual trigger for testing

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Take portfolio snapshot
        run: python scripts/snapshot_ledger.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

      - name: Commit ledger update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/model_a_ledger.json
          git diff --cached --quiet || git commit -m "snapshot: Model A $(date -u +%Y-%m-%d)"
          git push